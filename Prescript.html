<body>

        <main>

            <p style="text-align: center;"><img src="./Prescript_files/The_Index_Logo.png"></p>

            <form id="nameForm">
                <label for="name">Who are you?</label><br>
                <input type="text" id="name" name="name"><br>
                <input type="submit" id="registerName" value="REGISTER">
            </form>

            <div id="prescriptMessenger">
                <div id="paperSlip">
                     <p></p>
                </div>
                
                <button id="prescriptComplete" onclick="clearPrescript()">Prescript Complete</button>
                <button id="drawPrescript" onclick="newPrescriptDisplay()">Draw Prescript</button>
            </div>

            <hr>

            <footer>
                <p><strong>Remember:</strong> You must complete your prescripts before drawing a new one.</p>
                <p style="text-align: center;"><button id="changeName" onclick="changeName()">Click to change your name.</button></p>
                <p style="text-align: right;">You may submit suggestions and bugs <a href="https://willoftheprescript.straw.page/" target="_blank">here.</a></p>
            </footer>

            <audio id="beeper">
                <source src="https://file.garden/ZR2QLXa-dUbt6tLS/index_message_1.wav" autoplay="" type="audio/wav">
            </audio>
            <audio id="finish">
                <source src="https://file.garden/ZR2QLXa-dUbt6tLS/index_message_2.wav" autoplay="" type="audio/wav">
            </audio>
        </main>
